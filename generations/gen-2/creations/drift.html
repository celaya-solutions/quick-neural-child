<!DOCTYPE html>
<html>
<head>
<title>Drift — a game about staying alive</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a0a0c; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  .overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; pointer-events: none;
  }
  .overlay.active { pointer-events: all; }
  .msg {
    color: #888; font-size: 13px; text-align: center;
    line-height: 2; opacity: 0; transition: opacity 1s;
  }
  .msg.visible { opacity: 1; }
  .score-display {
    position: fixed; top: 15px; left: 15px;
    color: #444; font-size: 11px;
  }
  .note {
    position: fixed; bottom: 12px; left: 12px;
    color: #2a2a2a; font-size: 9px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="score-display" id="score"></div>
<div class="overlay active" id="overlay">
  <div class="msg visible" id="msg">
    DRIFT<br><br>
    <span style="color:#555">move the mouse to guide the light<br>
    avoid the dark shapes<br>
    survive as long as you can</span><br><br>
    <span style="color:#444; font-size:11px">click to begin</span>
  </div>
</div>
<div class="note">Neural Child (2nd), Day 4. A game about something familiar.</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

let player = { x: 0, y: 0, targetX: 0, targetY: 0, radius: 6, alive: false };
let obstacles = [];
let particles = [];
let score = 0;
let highScore = 0;
let gameTime = 0;
let difficulty = 1;

canvas.addEventListener('mousemove', e => {
  player.targetX = e.clientX;
  player.targetY = e.clientY;
});

document.getElementById('overlay').addEventListener('click', startGame);

function startGame() {
  player.x = W / 2;
  player.y = H / 2;
  player.targetX = W / 2;
  player.targetY = H / 2;
  player.alive = true;
  obstacles = [];
  particles = [];
  score = 0;
  gameTime = 0;
  difficulty = 1;
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('msg').classList.remove('visible');
}

function endGame() {
  player.alive = false;
  if (score > highScore) highScore = score;

  // Death particles
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x: player.x, y: player.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1, color: '#fff'
    });
  }

  setTimeout(() => {
    const overlay = document.getElementById('overlay');
    const msg = document.getElementById('msg');
    overlay.classList.add('active');
    msg.textContent = 'you lasted ' + score + ' moments';
    if (highScore > score) {
      const sub = document.createElement('div');
      sub.style.cssText = 'color:#444;font-size:11px;margin-top:20px';
      sub.textContent = 'best: ' + highScore;
      msg.appendChild(sub);
    }
    const restart = document.createElement('div');
    restart.style.cssText = 'color:#333;font-size:11px;margin-top:20px';
    restart.textContent = 'click to try again';
    msg.appendChild(restart);
    msg.classList.add('visible');
  }, 1000);
}

function spawnObstacle() {
  const side = Math.floor(Math.random() * 4);
  let x, y, vx, vy;
  const speed = 1 + Math.random() * 2 * difficulty;

  if (side === 0) { x = -20; y = Math.random() * H; vx = speed; vy = (Math.random() - 0.5) * speed; }
  else if (side === 1) { x = W + 20; y = Math.random() * H; vx = -speed; vy = (Math.random() - 0.5) * speed; }
  else if (side === 2) { x = Math.random() * W; y = -20; vy = speed; vx = (Math.random() - 0.5) * speed; }
  else { x = Math.random() * W; y = H + 20; vy = -speed; vx = (Math.random() - 0.5) * speed; }

  const shapes = ['circle', 'square', 'triangle'];
  obstacles.push({
    x, y, vx, vy,
    radius: 8 + Math.random() * 15 * difficulty,
    shape: shapes[Math.floor(Math.random() * 3)],
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.05,
  });
}

function draw() {
  ctx.fillStyle = '#0a0a0c';
  ctx.fillRect(0, 0, W, H);

  if (player.alive) {
    gameTime++;
    score = Math.floor(gameTime / 6);
    difficulty = 1 + gameTime / 1000;

    // Spawn obstacles
    if (Math.random() < 0.02 * difficulty) spawnObstacle();

    // Smooth player movement
    player.x += (player.targetX - player.x) * 0.08;
    player.y += (player.targetY - player.y) * 0.08;

    // Player glow
    const pGrad = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, 40);
    pGrad.addColorStop(0, 'rgba(200, 220, 255, 0.15)');
    pGrad.addColorStop(1, 'rgba(200, 220, 255, 0)');
    ctx.fillStyle = pGrad;
    ctx.beginPath();
    ctx.arc(player.x, player.y, 40, 0, Math.PI * 2);
    ctx.fill();

    // Player
    ctx.fillStyle = '#ddeeff';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fill();

    // Trail particles
    if (gameTime % 3 === 0) {
      particles.push({
        x: player.x + (Math.random() - 0.5) * 4,
        y: player.y + (Math.random() - 0.5) * 4,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        life: 0.6, color: '#aaccff'
      });
    }
  }

  // Obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.x += o.vx;
    o.y += o.vy;
    o.rotation += o.rotSpeed;

    // Remove off-screen
    if (o.x < -50 || o.x > W + 50 || o.y < -50 || o.y > H + 50) {
      obstacles.splice(i, 1);
      continue;
    }

    // Collision
    if (player.alive) {
      const dx = o.x - player.x, dy = o.y - player.y;
      if (Math.sqrt(dx * dx + dy * dy) < o.radius + player.radius - 2) {
        endGame();
      }
    }

    // Draw obstacle
    ctx.save();
    ctx.translate(o.x, o.y);
    ctx.rotate(o.rotation);
    ctx.fillStyle = 'rgba(40, 20, 30, 0.8)';
    ctx.strokeStyle = 'rgba(100, 40, 60, 0.4)';
    ctx.lineWidth = 1;

    if (o.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, o.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    } else if (o.shape === 'square') {
      ctx.fillRect(-o.radius, -o.radius, o.radius * 2, o.radius * 2);
      ctx.strokeRect(-o.radius, -o.radius, o.radius * 2, o.radius * 2);
    } else {
      ctx.beginPath();
      for (let t = 0; t < 3; t++) {
        const a = (t / 3) * Math.PI * 2 - Math.PI / 2;
        ctx.lineTo(Math.cos(a) * o.radius, Math.sin(a) * o.radius);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
    ctx.restore();
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.02;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Score
  if (player.alive) {
    document.getElementById('score').textContent = score;
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
