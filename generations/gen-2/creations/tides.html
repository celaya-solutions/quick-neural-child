<!DOCTYPE html>
<html>
<head>
<title>Tides</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #080c12; overflow: hidden; }
  canvas { display: block; }
  .note {
    position: fixed; bottom: 12px; left: 12px;
    color: #1a2a3a; font-family: 'Courier New', monospace;
    font-size: 9px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="note">The moon pulls the water. The water doesn't know why. — NC2, Day 6</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

let time = 0;

function draw() {
  time += 0.008;

  // Sky gradient — shifts with time (day/night cycle)
  const dayPhase = (Math.sin(time * 0.3) + 1) / 2;
  const skyTop = lerpColor([5, 8, 15], [20, 40, 80], dayPhase * 0.3);
  const skyBot = lerpColor([8, 12, 20], [40, 60, 100], dayPhase * 0.3);
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.6);
  grad.addColorStop(0, rgb(skyTop));
  grad.addColorStop(1, rgb(skyBot));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Moon
  const moonX = W * 0.75 + Math.sin(time * 0.2) * W * 0.15;
  const moonY = H * 0.15 + Math.cos(time * 0.15) * H * 0.05;
  const moonGlow = ctx.createRadialGradient(moonX, moonY, 5, moonX, moonY, 80);
  moonGlow.addColorStop(0, 'rgba(200, 210, 230, 0.3)');
  moonGlow.addColorStop(0.3, 'rgba(150, 170, 200, 0.05)');
  moonGlow.addColorStop(1, 'rgba(150, 170, 200, 0)');
  ctx.fillStyle = moonGlow;
  ctx.beginPath();
  ctx.arc(moonX, moonY, 80, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(220, 225, 235, 0.8)';
  ctx.beginPath();
  ctx.arc(moonX, moonY, 12, 0, Math.PI * 2);
  ctx.fill();

  // Stars
  const rng = mulberry32(77);
  for (let i = 0; i < 60; i++) {
    const sx = rng() * W;
    const sy = rng() * H * 0.5;
    const brightness = 0.1 + rng() * 0.3;
    const twinkle = Math.sin(time * 3 + i * 2.3) * 0.1;
    ctx.fillStyle = 'rgba(200, 210, 230, ' + Math.max(0, brightness + twinkle) + ')';
    ctx.beginPath();
    ctx.arc(sx, sy, 0.5 + rng() * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Water — multiple wave layers
  const waterLine = H * 0.55;
  const tideOffset = Math.sin(time * 0.15) * H * 0.04; // Tide

  // Moon reflection on water
  const refX = moonX + Math.sin(time * 2) * 5;
  for (let i = 0; i < 15; i++) {
    const ry = waterLine + tideOffset + i * 8;
    const rw = 3 + Math.sin(time + i * 0.5) * 2;
    const ra = 0.15 - i * 0.01;
    if (ra <= 0) break;
    ctx.fillStyle = 'rgba(200, 210, 230, ' + ra + ')';
    ctx.beginPath();
    ctx.ellipse(refX + Math.sin(time * 1.5 + i) * 3, ry, rw, 1, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Waves
  for (let layer = 0; layer < 5; layer++) {
    const baseY = waterLine + tideOffset + layer * 15;
    const waveAmp = 4 + layer * 2;
    const alpha = 0.15 + layer * 0.08;
    const hue = 200 + layer * 5;
    const lightness = 15 + layer * 3;

    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 3) {
      const y = baseY +
        Math.sin(x * 0.008 + time * (1 + layer * 0.3)) * waveAmp +
        Math.sin(x * 0.015 + time * 0.7 + layer) * (waveAmp * 0.5) +
        Math.sin(x * 0.003 + time * 0.2) * (waveAmp * 2);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fillStyle = 'hsla(' + hue + ', 30%, ' + lightness + '%, ' + alpha + ')';
    ctx.fill();
  }

  // Shore
  const shoreY = H * 0.85;
  ctx.fillStyle = '#0a0e14';
  ctx.fillRect(0, shoreY, W, H - shoreY);

  // Foam where waves meet shore
  for (let x = 0; x < W; x += 2) {
    const foamY = shoreY - 5 + Math.sin(x * 0.02 + time) * 3 + tideOffset * 0.5;
    const foamA = 0.05 + Math.sin(x * 0.05 + time * 2) * 0.03;
    ctx.fillStyle = 'rgba(180, 200, 220, ' + Math.max(0, foamA) + ')';
    ctx.fillRect(x, foamY, 1.5, 1);
  }

  requestAnimationFrame(draw);
}

function lerpColor(a, b, t) {
  return a.map((v, i) => Math.round(v + (b[i] - v) * t));
}

function rgb(arr) {
  return 'rgb(' + arr.join(',') + ')';
}

function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

draw();
</script>
</body>
</html>
